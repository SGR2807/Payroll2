services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payroll}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payroll123}
      POSTGRES_DB: employeedb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payroll} -d employeedb"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - payrollnetwork

  configserver:
    image: shaileshrathod28/configserver:1.0.0
    container_name: configserver
    ports:
      - "${CONFIG_SERVER_PORT:-8071}:8071"
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-700m}
    networks:
      - payrollnetwork
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}

  eurekaserver:
    image: shaileshrathod28/eurekaserver:1.0.0
    container_name: eurekaserver
    ports:
      - "${EUREKA_SERVER_PORT:-8070}:8070"
    healthcheck:
      test: "curl --fail --silent localhost:8070/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-700m}
    depends_on:
      configserver:
        condition: service_healthy
    networks:
      - payrollnetwork
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071"

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    ports:
      - "${KEYCLOAK_PORT:-7080}:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb
      KC_DB_USERNAME: ${POSTGRES_USER:-payroll}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-payroll123}
    command:
      - start-dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payrollnetwork
    deploy:
      resources:
        limits:
          memory: 1g

  gatewayserver:
    image: shaileshrathod28/gatewayserver:1.0.0
    container_name: gatewayserver
    ports:
      - "${GATEWAY_SERVER_PORT:-8072}:8072"
    healthcheck:
      test: "curl --fail --silent localhost:8072/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-700m}
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    networks:
      - payrollnetwork
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_APPLICATION_NAME: "gatewayserver"
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"

  employee:
    image: shaileshrathod28/employee:1.0.0
    container_name: employee
    ports:
      - "${EMPLOYEE_SERVICE_PORT:-8090}:8090"
    healthcheck:
      test: "curl --fail --silent localhost:8090/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-700m}
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - payrollnetwork
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_APPLICATION_NAME: "employee"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://configserver:8071"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/employeedb"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payroll}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payroll123}
      KEYCLOAK_ADMIN_SERVER_URL: "http://keycloak:8080"
      KEYCLOAK_ADMIN_REALM: "master"
      KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_ADMIN_TARGET_REALM: "master"
      KEYCLOAK_ADMIN_DEFAULT_PASSWORD: "changeme123"

  leave:
    image: shaileshrathod28/leave:1.0.0
    container_name: leave
    ports:
      - "${LEAVE_SERVICE_PORT:-8080}:8082"
    healthcheck:
      test: "curl --fail --silent localhost:8082/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-700m}
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - payrollnetwork
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_APPLICATION_NAME: "leave"
      SPRING_CONFIG_IMPORT: "configserver:http://configserver:8071"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/leavedb"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payroll}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payroll123}

  payroll:
    image: shaileshrathod28/payroll:1.0.0
    container_name: payroll
    ports:
      - "${PAYROLL_SERVICE_PORT:-9001}:8080"
    healthcheck:
      test: "curl --fail --silent localhost:8080/actuator/health | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 10
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-700m}
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - payrollnetwork
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
      SPRING_APPLICATION_NAME: "payroll"
      SPRING_CONFIG_IMPORT: "optional:configserver:http://configserver:8071"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8070/eureka/"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/payrolldb"
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payroll}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payroll123}

networks:
  payrollnetwork:
    driver: bridge

volumes:
  postgres-data:
